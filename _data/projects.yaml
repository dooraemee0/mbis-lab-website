- title: Domain and Test-Time Adaptation for Remote Sensing
  subtitle: Generalizing segmentation models to unseen regions, seasons, and sensors
  group: featured
  image: images/fallback.svg  # TODO: add images/projects/domain-test-time-adaptation-remote-sensing.jpg
