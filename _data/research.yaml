- title: Multimodal Biomedical System
  subtitle: Optical, ultrasound, and multimodal biomedical imaging systems
  image: "images/research/multimodal-biomedical-system.png"
  description: >
    Development of multimodal imaging systems that combine complementary contrast mechanisms — optical, spectral,
    and acoustic — for early detection and characterization of disease. Our systems integrate multispectral and
    photometric-stereo endoscopy, high-frequency acoustic radiation force impulse (ARFI) biomicroscopy, and
    single-beam acoustic tweezers for probing cell mechanics. Recent work extends into acoustic holography and
    ultrasound-based tissue optical clearing.
  tags:
    - multimodal-imaging
    - optical-imaging
    - high-frequency-ultrasound
    - endoscopy
    - acoustic-tweezers
    - acoustic-hologram

- title: Mobile & Connected Healthcare System
  subtitle: Smartphone-based diagnostics and privacy-preserving learning
  image: "images/research/mobile-healthcare-system.png"
  description: >
    Development of portable and smartphone-based diagnostic systems, together with the privacy-preserving learning
    frameworks needed to deploy them at scale. Our smartphone multispectral imaging platform quantitatively
    discriminates skin lesions such as seborrheic dermatitis and psoriasis, and our federated learning work enables
    multi-institution model training on thyroid ultrasound and personalized skin diagnosis without sharing patient
    data. We also develop deep learning-based ECG classification and smartphone-based indoor localization for
    connected care environments.
  tags:
    - mobile-healthcare
    - smartphone-imaging
    - multispectral-imaging
    - federated-learning
    - ecg-classification
    - privacy-preserving-ai

- title: Deep Learning-based Image Analysis and Enhancement
  subtitle: AI-driven medical image analysis, segmentation, and enhancement
  image: "images/research/deep-learning-image-analysis-enhancement.png"
  description: >
    Development of deep learning architectures for medical image segmentation, enhancement, and diagnosis, with an
    emphasis on precise boundary delineation and adaptation to unseen clinical domains. Our contributions include
    the USIM Gate upsampling operator (AISTATS 2023), stochastic adaptive activation functions (NeurIPS 2022), and
    shape-memory networks for contextual semantic interpretation (ICLR 2025). Clinically, these methods power
    expert-level diagnosis of incomplete Kawasaki disease from echocardiography, breast tumor segmentation under
    speckle noise, real-time ultrasound enhancement for rotator cuff tear diagnosis, and velopharyngeal
    insufficiency assessment from videofluoroscopy.
  tags:
    - deep-learning
    - medical-image-analysis
    - segmentation
    - image-enhancement
    - domain-adaptation
    - test-time-adaptation
    - explainable-ai

- title: AI for Remote Sensing
  subtitle: Deep learning for aerial and satellite image analysis
  image: "images/research/ai-remote-sensing.svg"  # TODO: replace placeholder with final images/research/ai-remote-sensing.png
  description: >
    Development of deep learning algorithms for object extraction and change detection in high-resolution aerial
    and satellite imagery, in collaboration with Dabeeo Inc., a geospatial data company. A central challenge in
    remote sensing is the domain gap: a model trained on one city, season, or sensor degrades sharply on another.
    Our research addresses this through domain-adaptive and test-time-adaptive learning — including self-mutating
    networks (ICCV 2021), transfer-attack-based domain adaptation, and path-selective test-time adaptation — while
    also targeting the fine-grained boundary accuracy required for automated digital map generation. Applications
    extend to urban land change monitoring, defense, and autonomous driving.
  tags:
    - remote-sensing
    - aerial-imagery
    - satellite-imagery
    - building-extraction
    - change-detection
    - domain-adaptation
    - digital-mapping

- title: Multimodal Endoscopy System
  subtitle: Optical-multispectral and high-frequency-ultrasound endoscopy for gastric tumor detection
  image: images/fallback.svg  # TODO: add images/projects/multimodal-endoscopy-system.jpg
  description: >
    A forward-looking endoscopic system fusing optical multispectral and high-frequency ultrasound imaging for
    real-time gastric tumor detection (IEEE Transactions on Medical Imaging, 2020), later extended with
    photometric-stereo imaging for 3D lesion topography to aid delineation of malignant gastric lesions
    (Biomedical Optics Express, 2019).
  tags:
    - endoscopy
    - multimodal-imaging
    - multispectral-imaging
    - high-frequency-ultrasound
    - gastric-lesion

- title: Mobile Multispectral Imaging for Skin Care
  subtitle: Deep learning-based discrimination of scalp skin lesions via smartphone multispectral imaging
  image: images/fallback.svg  # TODO: add images/projects/mobile-multispectral-skin-imaging.jpg
  description: >
    Smartphone-based multispectral imaging with machine learning-based discrimination between seborrheic
    dermatitis and psoriasis on the scalp (Biomedical Optics Express, 2019), extended with mSpecFusion-Net, a
    multimodal deep fusion network for differential diagnosis of psoriasis and dermatitis (MICCAI 2026).
  tags:
    - mobile-healthcare
    - multispectral-imaging
    - smartphone-imaging
    - skin-diagnosis
    - deep-learning

- title: Deep Learning for Ultrasound Denoising and Wearable Monitoring
  subtitle: Self-attention denoising and coarse-to-fine shape estimation for wearable ultrasound
  image: images/fallback.svg  # TODO: add images/projects/deep-learning-ultrasound-denoising-wearable.jpg
  description: >
    A multi-scale self-attention network for denoising medical ultrasound images (APSIPA Transactions on Signal
    and Information Processing, 2024), and a deep learning-based coarse-to-fine shape estimation model for
    accurate bladder volume monitoring on wearable ultrasound devices (IEEE Transactions on Ultrasonics,
    Ferroelectrics, and Frequency Control, 2024).
  tags:
    - deep-learning
    - image-enhancement
    - ultrasound
    - wearable-ultrasound

- title: Ultrasound Neuromodulation System
  subtitle: Acoustic hologram techniques for transcranial ultrasound neuromodulation
  image: images/fallback.svg  # TODO: add images/projects/ultrasound-neuromodulation-system.jpg
  description: >
    A machine learning-enhanced, skull-universal acoustic hologram for efficient transcranial ultrasound
    neuromodulation across varied rodent skulls (IEEE Transactions on Ultrasonics, Ferroelectrics, and Frequency
    Control, 2024), extended to a physics-aware hologram technique for high-fidelity multi-focal stimulation
    (Brain Stimulation, 2026).
  tags:
    - ultrasound
    - neuromodulation
    - acoustic-hologram
    - biomedical-system

- title: Boundary-Precise Building Extraction from Aerial Imagery
  subtitle: Boundary-oriented segmentation for manual-delineation-level digital mapping
  image: images/fallback.svg  # TODO: add images/projects/boundary-precise-building-extraction.jpg
  description: >
    A boundary-oriented binary building segmentation model with two-scheme learning for aerial images (IEEE
    Transactions on Geoscience & Remote Sensing, 2021), developed with Dabeeo Inc. to reach
    manual-delineation-level footprint accuracy for automated digital map generation.
  tags:
    - remote-sensing
    - building-extraction
    - digital-mapping
    - industry-collaboration

- title: Federated Learning for Privacy-Preserving Medical AI
