- title: Multimodal Biomedical System
  subtitle: Optical, ultrasound, and multimodal biomedical imaging systems
  image: "images/research/multimodal-biomedical-system.png"
  link: projects
  description: >
    Development of multimodal imaging systems that combine complementary contrast mechanisms — optical, spectral,
    and acoustic — for early detection and characterization of disease. Our systems integrate multispectral and
    photometric-stereo endoscopy, high-frequency acoustic radiation force impulse (ARFI) biomicroscopy, and
    single-beam acoustic tweezers for probing cell mechanics. Recent work extends into acoustic holography and
    ultrasound-based tissue optical clearing.
  tags:
    - multimodal-imaging
    - optical-imaging
    - high-frequency-ultrasound
    - endoscopy
    - acoustic-tweezers
    - acoustic-hologram

- title: Mobile & Connected Healthcare System
  subtitle: Smartphone-based diagnostics and privacy-preserving learning
  image: "images/research/mobile-healthcare-system.png"
  link: projects
  description: >
    Development of portable and smartphone-based diagnostic systems, together with the privacy-preserving learning
    frameworks needed to deploy them at scale. Our smartphone multispectral imaging platform quantitatively
    discriminates skin lesions such as seborrheic dermatitis and psoriasis, and our federated learning work enables
    multi-institution model training on thyroid ultrasound and personalized skin diagnosis without sharing patient
    data. We also develop deep learning-based ECG classification and smartphone-based indoor localization for
    connected care environments.
  tags:
    - mobile-healthcare
    - smartphone-imaging
    - multispectral-imaging
    - federated-learning
    - ecg-classification
    - privacy-preserving-ai

- title: Deep Learning-based Image Analysis and Enhancement
  subtitle: AI-driven medical image analysis, segmentation, and enhancement
  image: "images/research/deep-learning-image-analysis-enhancement.png"
  link: projects
  description: >
    Development of deep learning architectures for medical image segmentation, enhancement, and diagnosis, with an
    emphasis on precise boundary delineation and adaptation to unseen clinical domains. Our contributions include
    the USIM Gate upsampling operator (AISTATS 2023), stochastic adaptive activation functions (NeurIPS 2022), and
    shape-memory networks for contextual semantic interpretation (ICLR 2025). Clinically, these methods power
    expert-level diagnosis of incomplete Kawasaki disease from echocardiography, breast tumor segmentation under
    speckle noise, real-time ultrasound enhancement for rotator cuff tear diagnosis, and velopharyngeal
    insufficiency assessment from videofluoroscopy.
  tags:
    - deep-learning
    - medical-image-analysis
    - segmentation
    - image-enhancement
    - domain-adaptation
    - test-time-adaptation
    - explainable-ai

- title: AI for Remote Sensing
  subtitle: Deep learning for aerial and satellite image analysis
  image: "images/research/ai-remote-sensing.svg"  # TODO: replace placeholder with final images/research/ai-remote-sensing.png
  link: projects
  description: >
    Development of deep learning algorithms for object extraction and change detection in high-resolution aerial
    and satellite imagery, in collaboration with Dabeeo Inc., a geospatial data company. A central challenge in
    remote sensing is the domain gap: a model trained on one city, season, or sensor degrades sharply on another.
    Our research addresses this through domain-adaptive and test-time-adaptive learning — including self-mutating
    networks (ICCV 2021), transfer-attack-based domain adaptation, and path-selective test-time adaptation — while
    also targeting the fine-grained boundary accuracy required for automated digital map generation. Applications
    extend to urban land change monitoring, defense, and autonomous driving.
  tags:
    - remote-sensing
    - aerial-imagery
    - satellite-imagery
    - building-extraction
    - change-detection
    - domain-adaptation
    - digital-mapping
